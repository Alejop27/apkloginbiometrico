name: seg4_app
description: "Seg4 - Login con datos biométricos + Artículos"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Autenticación biométrica (huella / Face ID)
  local_auth: ^2.3.0

  # Almacenamiento seguro para el JWT biométrico (larga vida)
  flutter_secure_storage: ^9.2.2

  # Imágenes de red con caché
  cached_network_image: ^3.3.1

  # Peticiones HTTP
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
